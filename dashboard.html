<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Dashboard - ResinArte</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <nav class="max-w-7xl mx-auto flex justify-between items-center px-8 py-6">
      <div class="flex items-center gap-3">
        <img src="assets/images/logo/LogoResinArte.webp" alt="Logo" class="logo-img" style="height: 2.5rem; width: 2.5rem;">
        <span class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#7B61FF] to-[#BC56F4]">ResinArte</span>
      </div>
      <div class="flex items-center gap-4">
        <span id="userEmail" class="text-gray-700"></span>
        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
          Cerrar sesión
        </button>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-8 py-12">
    <!-- Welcome Section -->
    <div class="mb-12">
      <h1 class="text-4xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-[#7B61FF] to-[#BC56F4]">
        Mi Dashboard
      </h1>
      <p class="text-gray-600">Aquí veras tu historial de personalizaciones y seguimiento de tus pedidos.</p>
    </div>

    <!-- Stats Grid -->
    <div class="grid md:grid-cols-3 gap-6 mb-12">
      <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-lg">
        <p class="text-gray-600 text-sm mb-2">Solicitudes enviadas</p>
        <p id="statsTotal" class="text-4xl font-bold text-blue-600">0</p>
      </div>
      <div class="bg-gradient-to-br from-yellow-50 to-yellow-100 p-6 rounded-lg">
        <p class="text-gray-600 text-sm mb-2">Pendientes</p>
        <p id="statsPending" class="text-4xl font-bold text-yellow-600">0</p>
      </div>
      <div class="bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-lg">
        <p class="text-gray-600 text-sm mb-2">Completadas</p>
        <p id="statsCompleted" class="text-4xl font-bold text-green-600">0</p>
      </div>
    </div>

    <!-- Table Section -->
    <div class="bg-white rounded-lg shadow-md">
      <div class="px-6 py-4 border-b border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800">Mis Personalizaciones</h2>
      </div>

      <div id="emptyState" class="p-12 text-center">
        <p class="text-gray-500 mb-4">Aún no tienes solicitudes de personalización</p>
        <a href="index.html#personalizacion" class="btn-primary inline-block">
          Crear nueva personalización
        </a>
      </div>

      <div id="tableContainer" class="hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Fecha</th>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Color</th>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Tamaño</th>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Estado</th>
                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Acciones</th>
              </tr>
            </thead>
            <tbody id="personalizations" class="divide-y divide-gray-200">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let currentUser = null;

    // Check authentication
    async function initDashboard() {
      const user = await getCurrentUser();
      
      if (!user) {
        window.location.href = 'auth.html';
        return;
      }

      currentUser = user;
      document.getElementById('userEmail').textContent = user.email;

      // Load personalizations
      loadPersonalizations();
    }

    // Load user's personalizations
    async function loadPersonalizations() {
      try {
        const { data, error } = await supabaseClient
          .from('personalizaciones')
          .select('*')
          .eq('email', currentUser.email)
          .order('fecha_solicitud', { ascending: false });

        if (error) throw error;

        if (data.length === 0) {
          document.getElementById('emptyState').classList.remove('hidden');
          document.getElementById('tableContainer').classList.add('hidden');
        } else {
          document.getElementById('emptyState').classList.add('hidden');
          document.getElementById('tableContainer').classList.remove('hidden');

          // Populate table
          const tbody = document.getElementById('personalizations');
          tbody.innerHTML = data.map(item => `
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4 text-sm text-gray-700">
                ${new Date(item.fecha_solicitud).toLocaleDateString('es-ES')}
              </td>
              <td class="px-6 py-4 text-sm">
                <span class="inline-block w-6 h-6 rounded border-2" style="background-color: ${getColorValue(item.color_preferido)}; border-color: ${getColorValue(item.color_preferido)}40;"></span>
                ${item.color_preferido}
              </td>
              <td class="px-6 py-4 text-sm text-gray-700">${item.tamano || item['tamaño'] || '-'}</td>
              <td class="px-6 py-4 text-sm">
                <span class="px-3 py-1 rounded-full text-sm font-medium ${getStatusBadgeClass(item.estado)}">
                  ${item.estado}
                </span>
              </td>
              <td class="px-6 py-4 text-sm">
                <button onclick="viewDetails('${item.id}')" class="text-blue-600 hover:text-blue-800 font-medium">
                  Ver detalles
                </button>
              </td>
            </tr>
          `).join('');

          // Update stats
          updateStats(data);
        }
      } catch (error) {
        console.error('Error loading personalizations:', error);
      }
    }

    // Get color hex value
    function getColorValue(colorName) {
      const colors = {
        'Perlado rosa': '#FFB6C1',
        'Celeste cristal': '#B0E0E6',
        'Marfil suave': '#FFFFF0',
        'Lavanda': '#E6E6FA'
      };
      return colors[colorName] || '#ccc';
    }

    // Status badge styling
    function getStatusBadgeClass(status) {
      const classes = {
        'pendiente': 'bg-yellow-100 text-yellow-800',
        'en proceso': 'bg-blue-100 text-blue-800',
        'completado': 'bg-green-100 text-green-800',
        'cancelado': 'bg-red-100 text-red-800'
      };
      return classes[status] || 'bg-gray-100 text-gray-800';
    }

    // Update statistics
    function updateStats(data) {
      document.getElementById('statsTotal').textContent = data.length;
      document.getElementById('statsPending').textContent = data.filter(d => d.estado === 'pendiente').length;
      document.getElementById('statsCompleted').textContent = data.filter(d => d.estado === 'completado').length;
    }

    // View details (placeholder)
    function viewDetails(id) {
      const item = document.querySelector(`[data-id="${id}"]`);
      alert('Detalles de tu solicitud:\n\n' + JSON.stringify(item, null, 2));
    }

    // Logout handler
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const result = await handleLogout();
      if (result.success) {
        window.location.href = 'index.html';
      }
    });

    // Initialize
    initDashboard();
  </script>
</body>
</html>
